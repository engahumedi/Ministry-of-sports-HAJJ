<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استئذان الخروج – معسكر المعيصم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}

nav{background:#0a2e18;color:#c9a227;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;border-bottom:2px solid #c9a227}
.nav-title{font-size:1rem;font-weight:700;color:#c9a227}
.nav-sub{font-size:.75rem;color:rgba(255,255,255,.6);margin-top:2px}
.nav-back{color:rgba(255,255,255,.8);text-decoration:none;font-size:.85rem;border:1px solid rgba(255,255,255,.3);padding:5px 12px;border-radius:20px}

.tabs-bar{display:flex;gap:0;max-width:620px;margin:16px auto 0;padding:0 16px}
.tab-btn{flex:1;padding:10px 6px;border:none;border-radius:10px 10px 0 0;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.88rem;font-weight:700;background:#ddd;color:#555;transition:.2s}
.tab-btn.active{background:#0a2e18;color:#c9a227}

.card{background:#fff;border-radius:0 0 16px 16px;padding:24px;max-width:620px;margin:0 auto 24px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.section-title{font-size:1.05rem;font-weight:800;color:#0a2e18;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid #f0f0f0}

.field{margin-bottom:16px}
.field label{display:block;font-size:.88rem;font-weight:700;color:#333;margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:1rem;outline:none;transition:.2s;background:#fff}
.field input:focus,.field select:focus{border-color:#1a6b3c;box-shadow:0 0 0 3px rgba(26,107,60,.1)}

.submit-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#1a6b3c,#2e8b57);color:#fff;font-family:'Tajawal',sans-serif;font-size:1.1rem;font-weight:800;cursor:pointer;margin-top:4px;transition:.2s}
.submit-btn:disabled{background:#aaa;cursor:not-allowed}
.gold-btn{background:#c9a227;color:#0a2e18;font-weight:800;padding:10px 28px;border-radius:30px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.95rem}
.outline-btn{background:transparent;color:#0a2e18;font-weight:700;padding:10px 24px;border-radius:30px;border:2px solid #0a2e18;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.9rem}

.req-card{border:1.5px solid #e8f5e9;border-radius:12px;padding:14px;margin-bottom:12px;background:#fafffe}
.req-card h3{font-size:.95rem;font-weight:800;color:#0a2e18;margin-bottom:6px}
.req-card p{font-size:.85rem;color:#555;margin:3px 0}
.req-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.approve-btn{padding:8px 18px;border-radius:8px;border:none;background:#1a6b3c;color:#fff;font-family:'Tajawal',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer}
.reject-btn{padding:8px 18px;border-radius:8px;background:#ffebee;color:#c62828;border:1px solid #ffcdd2;font-family:'Tajawal',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer}
.note-box{margin-top:8px;display:none}
.note-box input{width:100%;padding:9px 12px;border:2px solid #e0e0e0;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:.9rem;outline:none;margin-bottom:6px}
.note-box button{padding:7px 16px;border-radius:8px;border:none;background:#c62828;color:#fff;font-family:'Tajawal',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer}

.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.78rem;font-weight:700}
.badge-pending{background:#fff8e1;color:#e65100}
.badge-approved{background:#e8f5e9;color:#2e7d32}
.badge-rejected{background:#ffebee;color:#c62828}

.status-box{text-align:center;padding:30px 20px}
.status-icon{font-size:3.5rem;margin-bottom:10px;display:block}
.status-title{font-size:1.3rem;font-weight:900;color:#0a2e18;margin-bottom:8px}
.status-detail{margin-top:18px;text-align:right}
.status-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:.9rem}
.status-row:last-child{border:none}
.s-lbl{color:#666}
.s-val{font-weight:700;color:#0a2e18}

.req-id-box{background:#f0f8f3;border:2px solid #c9a227;border-radius:12px;padding:16px;text-align:center;margin:16px 0}
.req-id-label{font-size:.8rem;color:#666;margin-bottom:4px}
.req-id-num{font-size:1.5rem;font-weight:900;color:#0a2e18;letter-spacing:1px}

.lock-box{text-align:center;padding:10px 10px 20px}
.lock-icon{font-size:2.5rem;display:block;margin-bottom:8px}
.lock-title{font-size:1rem;font-weight:800;color:#0a2e18;margin-bottom:4px}
.lock-sub{font-size:.82rem;color:#888;margin-bottom:16px}

.stat-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:#0a2e18;color:#fff;border-radius:12px;padding:12px 16px;flex:1;min-width:80px;text-align:center}
.stat-num{font-size:1.6rem;font-weight:900;color:#c9a227;display:block}
.stat-lbl{font-size:.75rem;color:rgba(255,255,255,.7)}

.admin-row{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:8px}
.admin-row:last-child{border:none}
.leader-name{font-weight:800;color:#0a2e18;font-size:.95rem}
.leader-creds{font-size:.78rem;color:#555;margin-top:3px;background:#f0f8f3;border-radius:6px;padding:4px 8px;display:block;font-family:monospace}
.del-btn{padding:6px 12px;border-radius:8px;border:none;background:#ffebee;color:#c62828;font-family:'Tajawal',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;flex-shrink:0}

.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-in{flex:1;min-width:140px;padding:9px 12px;border:2px solid #e0e0e0;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:.9rem;outline:none}
.filter-sel{padding:9px 10px;border:2px solid #e0e0e0;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:.85rem;outline:none}
.ref-btn{padding:8px 14px;border-radius:10px;border:1px solid #a5d6a7;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.85rem;font-weight:700;background:#e8f5e9;color:#2e7d32}

.subtabs{display:flex;gap:8px;margin-bottom:18px}
.subtab{flex:1;padding:9px;border-radius:10px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-weight:700;font-size:.9rem;transition:.2s}
.subtab.on{background:#0a2e18;color:#c9a227}
.subtab.off{background:#eee;color:#555}

.empty{text-align:center;color:#aaa;padding:30px;font-size:.9rem}
.loading{text-align:center;color:#888;padding:30px;font-size:.9rem}

.toast{position:fixed;bottom:20px;right:16px;left:16px;max-width:400px;margin:auto;background:#0a2e18;color:#fff;padding:12px 18px;border-radius:10px;font-size:.9rem;text-align:center;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}
.toast.err{background:#c62828}
.toast.ok{background:#1a6b3c}

@media(max-width:400px){.tab-btn{font-size:.78rem;padding:9px 3px}}
</style>
</head>
<body>

<nav>
  <div>
    <div class="nav-title">🚪 استئذان الخروج</div>
    <div class="nav-sub">معسكر المعيصم 1447</div>
  </div>
  <a href="index.html" class="nav-back">← الرئيسية</a>
</nav>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzgzGxHTSRmIWwr_dusoi3wJzUrWUi9PrH9xXg2W4F7mEHIPJx3XocC3m7DAhjj2G94/exec';
const ADMIN_PASS = 'admin1447';
const app = document.getElementById('app');
const params = new URLSearchParams(location.search);

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = 'toast', 3200);
}

function badge(s) {
  const m = { pending:['pending','قيد الانتظار'], approved:['approved','موافق'], rejected:['rejected','مرفوض'] };
  const [c,l] = m[s] || ['pending',s];
  return `<span class="badge badge-${c}">${l}</span>`;
}

function get(action, extra) {
  const p = new URLSearchParams(Object.assign({ action }, extra || {}));
  return fetch(SCRIPT_URL + '?' + p).then(r => r.json());
}

function post(body) {
  return fetch(SCRIPT_URL, { method:'POST', mode:'no-cors',
    headers:{'Content-Type':'text/plain'}, body:JSON.stringify(body) });
}

function tabs(active) {
  return `<div class="tabs-bar">
    <button class="tab-btn ${active==='member'?'active':''}" onclick="goTab('member')">📋 طلب خروج</button>
    <button class="tab-btn ${active==='track'?'active':''}"  onclick="goTab('track')">🔍 متابعة</button>
    <button class="tab-btn ${active==='leader'?'active':''}" onclick="goTab('leader')">👤 القائد</button>
    <button class="tab-btn ${active==='admin'?'active':''}"  onclick="goTab('admin')">⚙️ المشرف</button>
  </div>`;
}

window.goTab = t => ({ member:viewMember, track:viewTrack, leader:viewLeaderLogin, admin:viewAdminLogin })[t]?.();

// ─── MEMBER ──────────────────────────────────────────────────────────────────
async function viewMember() {
  app.innerHTML = tabs('member') + `<div class="card">
    <div class="section-title">📋 طلب استئذان خروج</div>
    <div class="field"><label>الاسم الكامل</label><input id="r-name" type="text" placeholder="أدخل اسمك الكامل"></div>
    <div class="field"><label>القائد المسؤول</label><select id="r-leader"><option value="">جارٍ التحميل...</option></select></div>
    <div class="field"><label>سبب الخروج</label><input id="r-reason" type="text" placeholder="اكتب سبب الخروج"></div>
    <div class="field"><label>تاريخ العودة</label><input id="r-date" type="date"></div>
    <div class="field"><label>وقت العودة</label><input id="r-time" type="time"></div>
    <button class="submit-btn" id="r-submit">إرسال الطلب</button>
  </div>`;

  try {
    const ls = await get('getLeaders');
    const sel = document.getElementById('r-leader');
    sel.innerHTML = Array.isArray(ls) && ls.length
      ? '<option value="">اختر القائد</option>' + ls.map(l=>`<option value="${l.id}">${l.name}</option>`).join('')
      : '<option value="">لا يوجد قادة مضافون</option>';
  } catch { document.getElementById('r-leader').innerHTML = '<option value="">تعذّر التحميل</option>'; }

  document.getElementById('r-submit').addEventListener('click', async () => {
    const name = document.getElementById('r-name').value.trim();
    const sel  = document.getElementById('r-leader');
    const leaderId = sel.value;
    const leaderName = sel.options[sel.selectedIndex]?.text || '';
    const reason = document.getElementById('r-reason').value;
    const returnDate = document.getElementById('r-date').value;
    const returnTime = document.getElementById('r-time').value;
    if (!name)       return toast('أدخل اسمك الكامل','err');
    if (!leaderId)   return toast('اختر القائد المسؤول','err');
    if (!reason)     return toast('اختر سبب الخروج','err');
    if (!returnDate) return toast('حدد تاريخ العودة','err');
    if (!returnTime) return toast('حدد وقت العودة','err');
    const btn = document.getElementById('r-submit');
    btn.disabled = true; btn.textContent = 'جارٍ الإرسال...';
    const reqId = String(Date.now());
    await post({ action:'addRequest', id:reqId, name, leaderId, leaderName, reason, returnDate, returnTime });
    app.innerHTML = tabs('member') + `<div class="card"><div class="status-box">
      <span class="status-icon">✅</span>
      <div class="status-title">تم إرسال طلبك بنجاح</div>
      <p style="color:#666;font-size:.9rem">احتفظ برقم طلبك لمتابعة حالته</p>
      <div class="req-id-box"><div class="req-id-label">رقم الطلب</div><div class="req-id-num">${reqId}</div></div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="gold-btn" onclick="viewTrackById('${reqId}')">متابعة الحالة</button>
        <button class="outline-btn" onclick="viewMember()">طلب جديد</button>
      </div>
    </div></div>`;
  });
}

// ─── TRACK ────────────────────────────────────────────────────────────────────
function viewTrack() {
  app.innerHTML = tabs('track') + `<div class="card">
    <div class="section-title">🔍 متابعة حالة الطلب</div>
    <div class="field"><label>رقم الطلب</label><input id="t-id" type="text" placeholder="أدخل رقم الطلب"></div>
    <button class="submit-btn" id="t-go">تحقق من الحالة</button>
  </div>`;
  document.getElementById('t-go').addEventListener('click', () => {
    const id = document.getElementById('t-id').value.trim();
    if (!id) return toast('أدخل رقم الطلب','err');
    viewTrackById(id);
  });
}

window.viewTrackById = async function(reqId) {
  app.innerHTML = tabs('track') + `<div class="card"><div class="loading">جارٍ التحقق...</div></div>`;
  try {
    const d = await get('getStatus', { id: reqId });
    if (d.error) {
      app.innerHTML = tabs('track') + `<div class="card"><div class="status-box">
        <span class="status-icon">❌</span><div class="status-title">الطلب غير موجود</div>
        <p style="color:#888;margin-top:6px">تأكد من رقم الطلب</p>
        <button class="outline-btn" onclick="viewTrack()" style="margin-top:16px">بحث آخر</button>
      </div></div>`;
      return;
    }
    const ico = { pending:'⏳', approved:'✅', rejected:'❌' };
    app.innerHTML = tabs('track') + `<div class="card">
      <div class="status-box">
        <span class="status-icon">${ico[d.status]||'⏳'}</span>
        <div class="status-title">حالة الطلب: ${badge(d.status)}</div>
      </div>
      <div class="status-detail">
        <div class="status-row"><span class="s-lbl">الاسم</span><span class="s-val">${d.name}</span></div>
        <div class="status-row"><span class="s-lbl">القائد</span><span class="s-val">${d.leaderName}</span></div>
        <div class="status-row"><span class="s-lbl">السبب</span><span class="s-val">${d.reason}</span></div>
        <div class="status-row"><span class="s-lbl">تاريخ العودة</span><span class="s-val">${d.returnDate}</span></div>
        <div class="status-row"><span class="s-lbl">وقت العودة</span><span class="s-val">${d.returnTime}</span></div>
        ${d.note ? `<div class="status-row"><span class="s-lbl">ملاحظة القائد</span><span class="s-val">${d.note}</span></div>` : ''}
      </div>
      <div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap">
        <button class="gold-btn" onclick="viewTrackById('${reqId}')">🔄 تحديث</button>
        <button class="outline-btn" onclick="viewTrack()">بحث آخر</button>
      </div>
    </div>`;
  } catch {
    app.innerHTML = tabs('track') + `<div class="card"><div class="status-box">
      <span class="status-icon">⚠️</span><div class="status-title">خطأ في الاتصال</div>
      <button class="gold-btn" onclick="viewTrackById('${reqId}')" style="margin-top:16px">إعادة المحاولة</button>
    </div></div>`;
  }
};

// ─── LEADER ───────────────────────────────────────────────────────────────────
function viewLeaderLogin() {
  const urlId  = params.get('id');
  const urlKey = params.get('key');
  if (params.get('v') === 'leader' && urlId && urlKey) { viewLeaderPanel(urlId, urlKey); return; }

  app.innerHTML = tabs('leader') + `<div class="card">
    <div class="lock-box">
      <span class="lock-icon">👤</span>
      <div class="lock-title">دخول القادة</div>
      <div class="lock-sub">أدخل بيانات دخولك التي أعطاها لك المشرف</div>
    </div>
    <div class="field"><label>رقم المعرّف</label><input id="l-id" type="text" placeholder="رقم المعرف"></div>
    <div class="field"><label>المفتاح السري</label><input id="l-key" type="text" placeholder="المفتاح السري"></div>
    <button class="submit-btn" id="l-in">دخول</button>
  </div>`;

  document.getElementById('l-in').addEventListener('click', async () => {
    const id  = document.getElementById('l-id').value.trim();
    const key = document.getElementById('l-key').value.trim();
    if (!id || !key) return toast('أدخل المعرّف والمفتاح','err');
    const btn = document.getElementById('l-in');
    btn.disabled = true; btn.textContent = 'جارٍ التحقق...';
    try {
      const res = await get('getRequests', { leaderId:id, key });
      if (res.error) { toast('بيانات الدخول غير صحيحة','err'); btn.disabled=false; btn.textContent='دخول'; return; }
      viewLeaderPanel(id, key);
    } catch { toast('خطأ في الاتصال','err'); btn.disabled=false; btn.textContent='دخول'; }
  });
}

async function viewLeaderPanel(lid, lkey) {
  app.innerHTML = tabs('leader') + `<div class="card"><div class="loading">جارٍ تحميل الطلبات...</div></div>`;

  async function load() {
    try {
      const data = await get('getRequests', { leaderId:lid, key:lkey });
      if (data.error) { viewLeaderLogin(); return; }
      const counts = [data.length, data.filter(r=>r.status==='pending').length,
                      data.filter(r=>r.status==='approved').length, data.filter(r=>r.status==='rejected').length];
      let html = tabs('leader') + `<div class="card">
        <div class="section-title">📥 طلبات الاستئذان</div>
        <div class="stat-bar">
          <div class="stat"><span class="stat-num">${counts[0]}</span><span class="stat-lbl">الكل</span></div>
          <div class="stat"><span class="stat-num">${counts[1]}</span><span class="stat-lbl">بانتظار</span></div>
          <div class="stat"><span class="stat-num">${counts[2]}</span><span class="stat-lbl">موافق</span></div>
          <div class="stat"><span class="stat-num">${counts[3]}</span><span class="stat-lbl">مرفوض</span></div>
        </div>`;
      if (!data.length) {
        html += `<div class="empty">لا توجد طلبات حتى الآن</div>`;
      } else {
        data.forEach(r => {
          const noteHtml = r.note ? `<p>💬 ${r.note}</p>` : '';
          const actions = r.status === 'pending' ? `
            <div class="req-actions">
              <button class="approve-btn" onclick="doUpdate('${r.id}','${lid}','${lkey}','approved')">✅ موافقة</button>
              <button class="reject-btn"  onclick="toggleNote('${r.id}')">❌ رفض</button>
            </div>
            <div class="note-box" id="nb-${r.id}">
              <input type="text" id="nv-${r.id}" placeholder="سبب الرفض (اختياري)">
              <button onclick="doUpdate('${r.id}','${lid}','${lkey}','rejected')">تأكيد الرفض</button>
            </div>` : '';
          html += `<div class="req-card">
            <h3>${r.name} ${badge(r.status)}</h3>
            <p>📋 ${r.reason}</p>
            <p>📅 العودة: ${r.returnDate} الساعة ${r.returnTime}</p>
            ${noteHtml}${actions}
          </div>`;
        });
      }
      html += `<button class="ref-btn" onclick="leaderLoad()" style="margin-top:4px">🔄 تحديث</button></div>`;
      app.innerHTML = html;
    } catch {
      app.innerHTML = tabs('leader') + `<div class="card"><div class="status-box">
        <span class="status-icon">⚠️</span><div class="status-title">خطأ في الاتصال</div>
        <button class="gold-btn" onclick="leaderLoad()" style="margin-top:16px">إعادة المحاولة</button>
      </div></div>`;
    }
  }

  window.leaderLoad = load;
  window.toggleNote = id => { const n=document.getElementById('nb-'+id); if(n) n.style.display=n.style.display==='block'?'none':'block'; };
  window.doUpdate   = async (requestId,leaderId,leaderKey,status) => {
    const noteEl = document.getElementById('nv-'+requestId);
    const note = noteEl ? noteEl.value : '';
    try {
      const res = await get('updateStatus',{leaderId,key:leaderKey,requestId,status,note});
      if (res.status==='ok') { toast(status==='approved'?'تمت الموافقة ✅':'تم الرفض','ok'); await load(); }
      else toast('خطأ: '+(res.error||''),'err');
    } catch { toast('خطأ في الاتصال','err'); }
  };

  await load();
}

// ─── ADMIN ────────────────────────────────────────────────────────────────────
function viewAdminLogin() {
  app.innerHTML = tabs('admin') + `<div class="card">
    <div class="lock-box">
      <span class="lock-icon">🔐</span>
      <div class="lock-title">دخول المشرف</div>
      <div class="lock-sub">هذه الصفحة للمشرف فقط</div>
    </div>
    <div class="field"><label>كلمة المرور</label><input id="a-pass" type="password" placeholder="كلمة مرور المشرف"></div>
    <button class="submit-btn" id="a-in">دخول</button>
  </div>`;
  document.getElementById('a-in').addEventListener('click', () => {
    const pass = document.getElementById('a-pass').value;
    if (pass !== ADMIN_PASS) return toast('كلمة المرور غلط','err');
    viewAdminPanel(pass);
  });
}

async function viewAdminPanel(pass) {
  let sub = 'leaders';

  function subTabs() {
    return `<div class="subtabs">
      <button class="subtab ${sub==='leaders'?'on':'off'}" onclick="adminSub('leaders')">👥 القادة</button>
      <button class="subtab ${sub==='requests'?'on':'off'}" onclick="adminSub('requests')">📋 الطلبات</button>
    </div>`;
  }

  window.adminSub = async t => { sub=t; t==='leaders' ? await renderLeaders() : await renderRequests(); };

  async function renderLeaders() {
    app.innerHTML = tabs('admin') + `<div class="card"><div class="section-title">⚙️ لوحة المشرف</div>${subTabs()}<div class="loading">جارٍ التحميل...</div></div>`;
    try {
      const ls = await get('getAllLeaders', { pass });
      let html = tabs('admin') + `<div class="card"><div class="section-title">⚙️ لوحة المشرف</div>${subTabs()}
        <div class="field"><label>اسم القائد الجديد</label><input id="add-n" type="text" placeholder="اسم القائد"></div>
        <button class="submit-btn" id="add-btn" style="margin-bottom:20px">إضافة قائد</button>
        <div class="section-title" style="font-size:.9rem;margin-top:4px">القادة الحاليون (${ls.length})</div>`;
      if (!ls.length) {
        html += `<div class="empty">لا يوجد قادة مضافون</div>`;
      } else {
        ls.forEach(l => {
          html += `<div class="admin-row">
            <div style="flex:1;min-width:0">
              <div class="leader-name">${l.name}</div>
              <span class="leader-creds">ID: ${l.id}  |  Key: ${l.key}</span>
            </div>
            <button class="del-btn" onclick="delLeader('${l.id}')">حذف</button>
          </div>`;
        });
      }
      html += `</div>`;
      app.innerHTML = html;
      document.getElementById('add-btn').addEventListener('click', async () => {
        const name = document.getElementById('add-n').value.trim();
        if (!name) return toast('أدخل اسم القائد','err');
        const btn = document.getElementById('add-btn');
        btn.disabled=true; btn.textContent='جارٍ...';
        try {
          const res = await get('addLeader',{pass,name});
          if (res.status==='ok') { toast('تمت الإضافة ✅','ok'); await renderLeaders(); }
          else { toast('خطأ: '+res.error,'err'); btn.disabled=false; btn.textContent='إضافة قائد'; }
        } catch { toast('خطأ في الاتصال','err'); btn.disabled=false; btn.textContent='إضافة قائد'; }
      });
    } catch {
      app.innerHTML = tabs('admin') + `<div class="card"><div class="status-box"><span class="status-icon">⚠️</span><div class="status-title">خطأ في الاتصال</div></div></div>`;
    }
  }

  window.delLeader = async id => {
    if (!confirm('حذف هذا القائد؟')) return;
    try {
      const res = await get('deleteLeader',{pass,id});
      if (res.status==='ok') { toast('تم الحذف','ok'); await renderLeaders(); }
      else toast('خطأ: '+res.error,'err');
    } catch { toast('خطأ في الاتصال','err'); }
  };

  async function renderRequests() {
    app.innerHTML = tabs('admin') + `<div class="card"><div class="section-title">⚙️ لوحة المشرف</div>${subTabs()}<div class="loading">جارٍ التحميل...</div></div>`;
    try {
      const all = await get('getAllRequests',{pass});
      const counts = [all.length, all.filter(r=>r.status==='pending').length,
                      all.filter(r=>r.status==='approved').length, all.filter(r=>r.status==='rejected').length];
      let html = tabs('admin') + `<div class="card"><div class="section-title">⚙️ لوحة المشرف</div>${subTabs()}
        <div class="stat-bar">
          <div class="stat"><span class="stat-num">${counts[0]}</span><span class="stat-lbl">الكل</span></div>
          <div class="stat"><span class="stat-num">${counts[1]}</span><span class="stat-lbl">بانتظار</span></div>
          <div class="stat"><span class="stat-num">${counts[2]}</span><span class="stat-lbl">موافق</span></div>
          <div class="stat"><span class="stat-num">${counts[3]}</span><span class="stat-lbl">مرفوض</span></div>
        </div>
        <div class="toolbar">
          <input class="search-in" id="srch" placeholder="بحث باسم...">
          <select class="filter-sel" id="flt"><option value="">الكل</option><option value="pending">بانتظار</option><option value="approved">موافق</option><option value="rejected">مرفوض</option></select>
          <button class="ref-btn" onclick="adminSub('requests')">🔄</button>
        </div>`;
      if (!all.length) {
        html += `<div class="empty">لا توجد طلبات</div>`;
      } else {
        all.forEach(r => {
          const noteHtml = r.note ? `<p>💬 ${r.note}</p>` : '';
          const ts = r.timestamp ? new Date(r.timestamp).toLocaleString('ar-SA') : '';
          html += `<div class="req-card" data-name="${r.name}" data-status="${r.status}">
            <h3>${r.name} ${badge(r.status)}</h3>
            <p>👤 ${r.leaderName} &nbsp;|&nbsp; 📋 ${r.reason}</p>
            <p>📅 العودة: ${r.returnDate} الساعة ${r.returnTime}</p>
            ${noteHtml}
            <p style="font-size:.75rem;color:#aaa;margin-top:4px">${ts}</p>
          </div>`;
        });
      }
      html += `</div>`;
      app.innerHTML = html;
      const filter = () => {
        const q = (document.getElementById('srch')?.value||'').toLowerCase();
        const f = document.getElementById('flt')?.value||'';
        document.querySelectorAll('.req-card').forEach(el => {
          el.style.display = (!q||el.dataset.name.toLowerCase().includes(q)) && (!f||el.dataset.status===f) ? '' : 'none';
        });
      };
      document.getElementById('srch')?.addEventListener('input', filter);
      document.getElementById('flt')?.addEventListener('change', filter);
    } catch {
      app.innerHTML = tabs('admin') + `<div class="card"><div class="status-box"><span class="status-icon">⚠️</span><div class="status-title">خطأ في الاتصال</div></div></div>`;
    }
  }

  await renderLeaders();
}

// ─── ROUTER ───────────────────────────────────────────────────────────────────
const view    = params.get('v');
const checkId = params.get('check');
if      (checkId)            viewTrackById(checkId);
else if (view === 'leader')  viewLeaderLogin();
else if (view === 'admin')   viewAdminLogin();
else                         viewMember();
</script>
